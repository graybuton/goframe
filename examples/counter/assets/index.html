<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>goframe counter</title>
    <style>
        body { font-family: sans-serif; margin: 3rem; }
        button { font: inherit; padding: 0.5rem 0.8rem; }
    </style>
    <!-- goframe:preload -->
    <!-- /goframe:preload -->
</head>
<body>
    <div id="root">Loading...</div>

    <script>
        const startupStarted = performance.now();

        globalThis.goframeRenderProbe = (phase, duration) => {
            console.log(`[goframe] ${phase}: ${duration.toFixed(2)} ms`);
            if (phase === "first-render") {
                console.log(
                    `[goframe] WASM startup + first render: ${(performance.now() - startupStarted).toFixed(2)} ms`,
                );
            }
        };
    </script>
    <!-- goframe:runtime -->
    <script src="wasm_exec.js"></script>
    <!-- /goframe:runtime -->
    <!-- goframe:bootstrap -->
    <script>
        const instantiateStarted = performance.now();
        const go = new Go();
        WebAssembly.instantiateStreaming(fetch("bundle.wasm"), go.importObject)
            .then((result) => {
                console.log(
                    `[goframe] WASM instantiate: ${(performance.now() - instantiateStarted).toFixed(2)} ms`,
                );
                go.run(result.instance);
            })
            .catch((error) => {
                console.error("[goframe] startup failed", error);
                document.getElementById("root").textContent = "Failed to start goframe. See console.";
            });
    </script>
    <!-- /goframe:bootstrap -->
</body>
</html>
